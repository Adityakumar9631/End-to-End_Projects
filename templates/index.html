<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚗 Car Price Prediction</h1>

<form action="/predict" method="post">

    <input type="number" name="Year" placeholder="Year" required>

    <input type="number" name="Kilometers_Driven" placeholder="KM Driven" required>

    <select name="Fuel_Type">
        <option>Petrol</option>
        <option>Diesel</option>
        <option>CNG</option>
        <option>LPG</option>
    </select>

    <select name="Transmission">
        <option>Manual</option>
        <option>Automatic</option>
    </select>

    <select name="Owner_Type">
        <option>First</option>
        <option>Second</option>
        <option>Third</option>
        <option>Fourth & Above</option>
    </select>

    <input type="number" step="0.1" name="Mileage" placeholder="Mileage" required>

    <input type="number" step="0.1" name="Engine" placeholder="Engine CC" required>

    <input type="number" step="0.1" name="Power" placeholder="Power" required>

    <input type="number" name="Seats" placeholder="Seats" required>

    <button type="submit">Predict Price</button>

</form>

</body>
</html>
