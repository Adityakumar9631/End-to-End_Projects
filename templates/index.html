<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚗 Car Price Prediction</h1>

<form action="/predict" method="post">

    <input type="number" name="year" placeholder="Year" required>
    <input type="number" name="km_driven" placeholder="KM Driven" required>

    <select name="fuel">
        <option value="0">Petrol</option>
        <option value="1">Diesel</option>
    </select>

    <select name="transmission">
        <option value="0">Manual</option>
        <option value="1">Automatic</option>
    </select>

    <select name="owner">
        <option value="0">First</option>
        <option value="1">Second</option>
        <option value="2">Third</option>
    </select>

    <input type="number" step="any" name="mileage" placeholder="Mileage" required>
    <input type="number" name="engine" placeholder="Engine CC" required>
    <input type="number" step="any" name="power" placeholder="Power" required>
    <input type="number" name="seats" placeholder="Seats" required>

    <button type="submit">Predict Price</button>

</form>

</body>
</html>
